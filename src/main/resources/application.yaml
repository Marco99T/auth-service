server:
  port: 8083

spring:
  application:
    name: auth-service

  datasource:
    # url: jdbc:mysql://localhost:3307/userdb
    url: jdbc:mysql://mysql-service:3306/userdb
    username: marco
    password: 123456789
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      # defaultZone: http://localhost:8761/eureka/
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true

jwt:
  refresh-expiration-ms: 604800000   # 7 días en milisegundos