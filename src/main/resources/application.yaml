server:
  port: 8083

spring:
  application:
    name: auth-service

  datasource:
    # url: jdbc:mysql://localhost:3307/userdb
    # url: jdbc:mysql://mysql-service:3306/userdb
    url: ${DB_URL:jdbc:mysql://mysql-service:3306/userdb}
    username: ${DB_USERNAME:marco}
    password: ${DB_PASSWORD:123456789}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      # defaultZone: http://localhost:8761/eureka/ #LOCAL
      defaultZone: ${URL_EUREKA:http://eureka-server:8761/eureka/} # RENDER | DOCKER
  instance:
    # hostname: auth-service # Nombre del servicio para Eureka
    prefer-ip-address: true # En Docker, es mejor usar la IP para evitar problemas de resolución de nombres
    # RENDER
    # secure-port-enabled: true
    # non-secure-port-enabled: false

jwt:
  refresh-expiration-ms: 604800000 # 7 días en milisegundos
