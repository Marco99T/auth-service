server:
  port: 8083

spring:
  application:
    name: auth-service

  datasource:
    # url: jdbc:mysql://localhost:3307/userdb
    # url: jdbc:mysql://mysql-service:3306/userdb
    url: ${DB_URL}
    # username: marco
    username: ${DB_USERNAME}
    # password: 123456789
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      # defaultZone: http://localhost:8761/eureka/
      # defaultZone: http://eureka-server:8761/eureka/
      defaultZone: https://eureka-server-ufvy.onrender.com/eureka/
  instance:
    # hostname: localhost
    hostname: auth-service-hjq7.onrender.com
    # prefer-ip-address: true
    prefer-ip-address: false
    # RENDER
    secure-port-enabled: true
    non-secure-port-enabled: false

jwt:
  refresh-expiration-ms: 604800000   # 7 días en milisegundos